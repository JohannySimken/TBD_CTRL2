spring.application.name=taskmanagement
server.port=8090

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/task_manager_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# JWT
jwt.secret=${JWT_SECRET:esta-es-la-clave-para-el-control-de-tbd-de-localizacion-geoespacial-gracias-jwt}
jwt.expiration=86400000